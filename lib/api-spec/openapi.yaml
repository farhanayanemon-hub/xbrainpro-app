openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: profile
    description: User profile and self-assessment
  - name: players
    description: Neura City player game profiles
  - name: paths
    description: Transformation paths
  - name: programs
    description: Personalized programs / plans
  - name: tasks
    description: Daily tasks
  - name: dashboard
    description: Dashboard and progress
  - name: reminders
    description: Notification reminders
  - name: chat
    description: AI coach chat
  - name: npc
    description: Neura City NPC chat
  - name: world
    description: Neura City world map
  - name: wallet
    description: Player coin and gem balances
  - name: store
    description: Neura City store purchases
  - name: daily-tasks
    description: Daily engagement tasks and login streak
  - name: mystery-box
    description: Mystery Box gem gambling
  - name: apartment
    description: Personal decorate-able apartment
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Create an account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the currently authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get the user's profile and self-assessment
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateProfile
      tags: [profile]
      summary: Update profile / self-assessment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /profile/avatar:
    post:
      operationId: uploadAvatar
      tags: [profile]
      summary: Upload a profile image to storage and set it as the avatar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvatarUpload"
      responses:
        "200":
          description: Updated user with new avatar URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Storage is not configured or upload failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /player/profile:
    get:
      operationId: getPlayerProfile
      tags: [players]
      summary: Get the authenticated player's game profile
      responses:
        "200":
          description: Player profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerProfile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Profile not created yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: upsertPlayerProfile
      tags: [players]
      summary: Create or update the authenticated player's game profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerProfileInput"
      responses:
        "200":
          description: Saved player profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerProfile"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /player/photo:
    post:
      operationId: uploadPlayerPhoto
      tags: [players]
      summary: Upload the authenticated player's profile photo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerPhotoUpload"
      responses:
        "200":
          description: Updated player profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerProfile"
        "400":
          description: Invalid or oversized image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Profile not created yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /player/home:
    get:
      operationId: getPlayerHome
      tags: [players]
      summary: Get the authenticated player's assigned house plot
      description: Returns the residential plot index assigned to the account. The client resolves the plot to a world position from the shared house objects.
      responses:
        "200":
          description: The player's home plot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerHome"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /players/{userId}:
    get:
      operationId: getPublicPlayerProfile
      tags: [players]
      summary: Get another player's public profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Public player profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerProfile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Player not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /players/{userId}/photo:
    get:
      operationId: getPlayerPhoto
      tags: [players]
      summary: Get a player's profile photo (image bytes)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Photo bytes
          content:
            image/*:
              schema:
                type: string
                format: binary
        "404":
          description: No photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /paths:
    get:
      operationId: listPaths
      tags: [paths]
      summary: List the available transformation paths
      responses:
        "200":
          description: Paths
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Path"

  /programs:
    get:
      operationId: listPrograms
      tags: [programs]
      summary: List the user's programs
      responses:
        "200":
          description: Programs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Program"
    post:
      operationId: createProgram
      tags: [programs]
      summary: Generate a personalized program with AI
      description: Uses the self-assessment, chosen path, and duration to generate a full plan with levels and daily tasks.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgramInput"
      responses:
        "201":
          description: Created program with generated levels and tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgramDetail"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /programs/current:
    get:
      operationId: getCurrentProgram
      tags: [programs]
      summary: Get the user's active program with levels and tasks
      responses:
        "200":
          description: Current program
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgramDetail"
        "404":
          description: No active program
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /programs/{id}:
    get:
      operationId: getProgram
      tags: [programs]
      summary: Get a program with its levels and tasks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Program detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgramDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteProgram
      tags: [programs]
      summary: Delete a program
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /programs/{id}/activate:
    post:
      operationId: activateProgram
      tags: [programs]
      summary: Make a program the active one
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Activated program
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgramDetail"

  /tasks/today:
    get:
      operationId: getTodayTasks
      tags: [tasks]
      summary: Get today's tasks for the active program
      responses:
        "200":
          description: Today's tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"

  /tasks/{id}/complete:
    post:
      operationId: completeTask
      tags: [tasks]
      summary: Mark a task complete and award XP
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Completion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskCompletionResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /tasks/{id}/uncomplete:
    post:
      operationId: uncompleteTask
      tags: [tasks]
      summary: Mark a task not complete
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Dashboard summary for the active program
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /progress:
    get:
      operationId: getProgress
      tags: [dashboard]
      summary: Progress, streak history, and badges
      responses:
        "200":
          description: Progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Progress"

  /badges:
    get:
      operationId: listBadges
      tags: [dashboard]
      summary: List badges the user has earned or can earn
      responses:
        "200":
          description: Badges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Badge"

  /reminders:
    get:
      operationId: listReminders
      tags: [reminders]
      summary: List reminders
      responses:
        "200":
          description: Reminders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reminder"
    post:
      operationId: createReminder
      tags: [reminders]
      summary: Create a reminder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReminderInput"
      responses:
        "201":
          description: Created reminder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reminder"

  /reminders/{id}:
    patch:
      operationId: updateReminder
      tags: [reminders]
      summary: Update a reminder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReminderUpdate"
      responses:
        "200":
          description: Updated reminder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reminder"
    delete:
      operationId: deleteReminder
      tags: [reminders]
      summary: Delete a reminder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /chat/messages:
    get:
      operationId: listChatMessages
      tags: [chat]
      summary: Get the AI coach chat history
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a message to the AI coach and get a reply
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "200":
          description: Assistant reply plus the stored user message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatReply"

  /npc/chat:
    post:
      operationId: npcChat
      tags: [npc]
      summary: Send a message to a Neura City NPC and get an in-character reply
      description: Anonymous, stateless endpoint. The client sends recent history; the server does not persist it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NpcChatInput"
      responses:
        "200":
          description: NPC reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NpcChatReply"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: The NPC is unavailable (AI failure)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /wallet:
    get:
      operationId: getWallet
      tags: [wallet]
      summary: Get the authenticated player's coin and gem balance
      description: Creates the wallet and grants the one-time starting balance on first access.
      responses:
        "200":
          description: The player's balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /store/avatars/{avatarId}/purchase:
    post:
      operationId: purchaseAvatar
      tags: [store]
      summary: Buy an avatar look with the player's currency
      description: Deducts the server-priced cost of the look. Idempotent per avatar — a repeat purchase does not charge again. Returns the updated balance.
      parameters:
        - name: avatarId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Purchase succeeded (or was already owned)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseAvatarResult"
        "400":
          description: Not enough currency
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Unknown avatar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /daily-tasks:
    get:
      operationId: getDailyTasks
      tags: [daily-tasks]
      summary: Get the player's daily task board and login streak
      description: Also counts this call as today's login, auto-completing the check-in task and advancing the streak.
      responses:
        "200":
          description: The daily task board
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyState"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /daily-tasks/{taskId}/advance:
    post:
      operationId: advanceDailyTask
      tags: [daily-tasks]
      summary: Record progress on a client-tracked daily task
      description: Progress is capped at the task's goal server-side. Unknown task ids are ignored. Returns the refreshed board.
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The refreshed daily task board
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyState"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /daily-tasks/{taskId}/claim:
    post:
      operationId: claimDailyTask
      tags: [daily-tasks]
      summary: Claim a completed daily task's reward
      description: Pays the reward into the player's wallet. Idempotent — a task can only be claimed once per day.
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The claim result and updated balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimResult"
        "400":
          description: Task is not complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Unknown task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /mystery-box:
    get:
      operationId: getMysteryBox
      tags: [mystery-box]
      summary: Get the Mystery Box cost and reward odds
      responses:
        "200":
          description: The box cost and reward pool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MysteryBoxInfo"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /mystery-box/open:
    post:
      operationId: openMysteryBox
      tags: [mystery-box]
      summary: Open the Mystery Box for a random reward
      description: Charges gems and returns a weighted random reward, atomically. Send a unique openId per attempt so a retry is idempotent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenMysteryBoxInput"
      responses:
        "200":
          description: The reward and updated balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenMysteryBoxResult"
        "400":
          description: Not enough gems or missing openId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /apartment:
    get:
      operationId: getApartment
      tags: [apartment]
      summary: Get the player's apartment layout
      description: Returns the saved furniture arrangement, or a default starter layout (isDefault=true) if the player has never decorated.
      responses:
        "200":
          description: The apartment layout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Apartment"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: saveApartment
      tags: [apartment]
      summary: Save the player's apartment layout
      description: Replaces the whole arrangement. The server validates items, clamps positions inside the room, and caps the item count.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveApartmentInput"
      responses:
        "200":
          description: The saved layout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Apartment"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /world/map:
    get:
      operationId: getWorldMap
      tags: [world]
      summary: Get the current Neura City world map
      description: Anonymous endpoint. Returns every placed world object. Supports ETag/If-None-Match so unchanged maps are not re-downloaded.
      responses:
        "200":
          description: The world map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorldMap"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    RegisterInput:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        name:
          type: string
          minLength: 1

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResult:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
          description: Bearer token for mobile clients. Web uses the session cookie.

    User:
      type: object
      required: [id, email, name, xp, level, streak, hasProgram, onboarded]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        avatarUrl:
          type: ["string", "null"]
        xp:
          type: integer
        level:
          type: integer
          description: Overall account level derived from XP
        streak:
          type: integer
          description: Current daily streak in days
        hasProgram:
          type: boolean
        onboarded:
          type: boolean
        createdAt:
          type: string
          format: date-time

    AvatarUpload:
      type: object
      required: [imageBase64, contentType]
      properties:
        imageBase64:
          type: string
          description: The image encoded as a base64 string (without data URI prefix)
        contentType:
          type: string
          description: The MIME type of the image, e.g. image/png or image/jpeg

    PlayerProfile:
      type: object
      required: [userId, displayName, gender, hasPhoto]
      properties:
        userId:
          type: integer
        displayName:
          type: string
        gender:
          type: string
          enum: [male, female]
        bio:
          type: ["string", "null"]
        hasPhoto:
          type: boolean
        photoUrl:
          type: ["string", "null"]
          description: Relative URL serving the photo bytes, null when no photo

    Wallet:
      type: object
      required: [coins, gems]
      properties:
        coins:
          type: integer
          description: Soft currency balance
        gems:
          type: integer
          description: Premium currency balance

    PurchaseAvatarResult:
      type: object
      required: [coins, gems, avatarId, owned]
      properties:
        coins:
          type: integer
        gems:
          type: integer
        avatarId:
          type: string
        owned:
          type: boolean

    DailyTask:
      type: object
      required: [id, title, description, goal, progress, completed, claimed, rewardCurrency, rewardAmount]
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        goal:
          type: integer
          description: Progress needed to complete the task
        progress:
          type: integer
          description: Current progress, capped at goal
        completed:
          type: boolean
        claimed:
          type: boolean
        rewardCurrency:
          type: string
          enum: [coins, gems]
        rewardAmount:
          type: integer

    DailyState:
      type: object
      required: [dayKey, streak, longestStreak, tasks]
      properties:
        dayKey:
          type: string
          description: UTC calendar day the board is for, e.g. "2026-07-11"
        streak:
          type: integer
          description: Consecutive days logged in, including today
        longestStreak:
          type: integer
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/DailyTask"

    ClaimResult:
      type: object
      required: [claimed, alreadyClaimed, rewardCurrency, rewardAmount, balance]
      properties:
        claimed:
          type: boolean
          description: True when this call paid out the reward
        alreadyClaimed:
          type: boolean
          description: True when the reward had already been claimed today
        rewardCurrency:
          type: string
          enum: [coins, gems]
        rewardAmount:
          type: integer
        balance:
          $ref: "#/components/schemas/Wallet"

    MysteryReward:
      type: object
      required: [type, amount, currency, avatarId]
      properties:
        type:
          type: string
          enum: [coins, gems, avatar]
        amount:
          type: integer
          description: Currency amount for coins/gems rewards, 0 for an avatar
        currency:
          type: ["string", "null"]
          enum: [coins, gems, null]
          description: Currency kind for coins/gems rewards, null for an avatar
        avatarId:
          type: ["string", "null"]
          description: Avatar look id for an avatar reward, null otherwise

    MysteryBoxInfo:
      type: object
      required: [cost, currency, pool]
      properties:
        cost:
          type: integer
          description: Gems charged to open one box
        currency:
          type: string
          enum: [coins, gems]
        pool:
          type: array
          description: The possible rewards (odds are implied by repetition weight, not exposed)
          items:
            $ref: "#/components/schemas/MysteryReward"

    OpenMysteryBoxInput:
      type: object
      required: [openId]
      properties:
        openId:
          type: string
          description: Client-generated idempotency key for this open attempt

    OpenMysteryBoxResult:
      type: object
      required: [reward, balance, charged]
      properties:
        reward:
          $ref: "#/components/schemas/MysteryReward"
        balance:
          $ref: "#/components/schemas/Wallet"
        charged:
          type: boolean
          description: False when this was a replay of a previous open (idempotent)

    PlayerHome:
      type: object
      required: [plot]
      properties:
        plot:
          type: integer
          description: Index of the assigned residential house plot in the world map.

    PlacedFurniture:
      type: object
      required: [uid, item, x, z, rotY]
      properties:
        uid:
          type: string
          description: Unique id for this placed instance within the layout.
        item:
          type: string
          description: Catalog id — a built-in furniture id or an "apartment" zone model id.
        x:
          type: number
          description: Floor X position inside the room.
        z:
          type: number
          description: Floor Z position inside the room.
        rotY:
          type: number
          description: Yaw rotation in radians.

    Apartment:
      type: object
      required: [layout, isDefault]
      properties:
        layout:
          type: array
          items:
            $ref: "#/components/schemas/PlacedFurniture"
        isDefault:
          type: boolean
          description: True when this is the served starter layout, not yet saved by the player.

    SaveApartmentInput:
      type: object
      required: [layout]
      properties:
        layout:
          type: array
          items:
            $ref: "#/components/schemas/PlacedFurniture"

    PlayerProfileInput:
      type: object
      required: [displayName, gender]
      properties:
        displayName:
          type: string
          minLength: 2
          maxLength: 24
        gender:
          type: string
          enum: [male, female]
        bio:
          type: ["string", "null"]
          maxLength: 300

    PlayerPhotoUpload:
      type: object
      required: [imageBase64, contentType]
      properties:
        imageBase64:
          type: string
          description: The image encoded as a base64 string (without data URI prefix)
        contentType:
          type: string
          description: MIME type, e.g. image/jpeg or image/png

    Profile:
      type: object
      required: [userId, onboarded]
      properties:
        userId:
          type: integer
        onboarded:
          type: boolean
        about:
          type: ["string", "null"]
          description: What the user said about themselves
        currentSituation:
          type: ["string", "null"]
        biggestChallenge:
          type: ["string", "null"]
        motivation:
          type: ["string", "null"]
        focusMinutesPerDay:
          type: ["integer", "null"]

    ProfileUpdate:
      type: object
      properties:
        about:
          type: string
        currentSituation:
          type: string
        biggestChallenge:
          type: string
        motivation:
          type: string
        focusMinutesPerDay:
          type: integer
        onboarded:
          type: boolean

    Path:
      type: object
      required: [key, title, tagline, description, accent]
      properties:
        key:
          type: string
          description: One of millionaire, business, heartbreak, happiness, superhuman, confidence, focus
        title:
          type: string
        tagline:
          type: string
        description:
          type: string
        accent:
          type: string
          description: A hex color hint associated with the path
        outcomes:
          type: array
          items:
            type: string

    ProgramInput:
      type: object
      required: [pathKey, durationDays]
      properties:
        pathKey:
          type: string
        durationDays:
          type: integer
          description: 30 or 60
        about:
          type: string
        currentSituation:
          type: string
        biggestChallenge:
          type: string
        motivation:
          type: string

    Program:
      type: object
      required: [id, pathKey, pathTitle, durationDays, status, currentLevel, totalLevels, progressPct, createdAt]
      properties:
        id:
          type: integer
        pathKey:
          type: string
        pathTitle:
          type: string
        title:
          type: string
        durationDays:
          type: integer
        status:
          type: string
          description: active, completed, or archived
        currentLevel:
          type: integer
        totalLevels:
          type: integer
        progressPct:
          type: integer
        accent:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ProgramDetail:
      type: object
      required: [id, pathKey, pathTitle, durationDays, status, currentLevel, totalLevels, progressPct, levels, createdAt]
      properties:
        id:
          type: integer
        pathKey:
          type: string
        pathTitle:
          type: string
        title:
          type: string
        summary:
          type: ["string", "null"]
        durationDays:
          type: integer
        status:
          type: string
        currentLevel:
          type: integer
        totalLevels:
          type: integer
        progressPct:
          type: integer
        accent:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        levels:
          type: array
          items:
            $ref: "#/components/schemas/Level"

    Level:
      type: object
      required: [id, levelNumber, title, status, xpReward, tasks]
      properties:
        id:
          type: integer
        levelNumber:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          description: locked, active, or completed
        xpReward:
          type: integer
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"

    Task:
      type: object
      required: [id, levelId, levelNumber, dayNumber, title, completed, xp]
      properties:
        id:
          type: integer
        levelId:
          type: integer
        levelNumber:
          type: integer
        dayNumber:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        timeOfDay:
          type: ["string", "null"]
          description: Suggested time like "07:00" or "Morning"
        durationMinutes:
          type: ["integer", "null"]
        completed:
          type: boolean
        completedAt:
          type: ["string", "null"]
          format: date-time
        xp:
          type: integer

    TaskCompletionResult:
      type: object
      required: [task, xpAwarded, totalXp, streak, leveledUp]
      properties:
        task:
          $ref: "#/components/schemas/Task"
        xpAwarded:
          type: integer
        totalXp:
          type: integer
        streak:
          type: integer
        leveledUp:
          type: boolean
        newBadges:
          type: array
          items:
            $ref: "#/components/schemas/Badge"

    DashboardSummary:
      type: object
      required: [hasProgram, xp, level, streak, todayTotal, todayCompleted]
      properties:
        hasProgram:
          type: boolean
        program:
          $ref: "#/components/schemas/Program"
        xp:
          type: integer
        level:
          type: integer
        streak:
          type: integer
        longestStreak:
          type: integer
        todayTotal:
          type: integer
        todayCompleted:
          type: integer
        todayTasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"
        nextLevelTitle:
          type: ["string", "null"]
        quote:
          type: ["string", "null"]
          description: A motivational line for the day

    Progress:
      type: object
      required: [xp, level, streak, longestStreak, totalTasksCompleted, completionRate, weeklyActivity, badges]
      properties:
        xp:
          type: integer
        level:
          type: integer
        streak:
          type: integer
        longestStreak:
          type: integer
        totalTasksCompleted:
          type: integer
        completionRate:
          type: integer
        weeklyActivity:
          type: array
          items:
            $ref: "#/components/schemas/DayActivity"
        badges:
          type: array
          items:
            $ref: "#/components/schemas/Badge"

    DayActivity:
      type: object
      required: [date, completed]
      properties:
        date:
          type: string
          format: date
        completed:
          type: integer

    Badge:
      type: object
      required: [key, title, description, earned]
      properties:
        key:
          type: string
        title:
          type: string
        description:
          type: string
        icon:
          type: ["string", "null"]
        earned:
          type: boolean
        earnedAt:
          type: ["string", "null"]
          format: date-time

    Reminder:
      type: object
      required: [id, title, timeOfDay, enabled, daysOfWeek]
      properties:
        id:
          type: integer
        title:
          type: string
        timeOfDay:
          type: string
          description: "HH:MM 24-hour"
        enabled:
          type: boolean
        daysOfWeek:
          type: array
          description: 0=Sunday .. 6=Saturday
          items:
            type: integer

    ReminderInput:
      type: object
      required: [title, timeOfDay]
      properties:
        title:
          type: string
        timeOfDay:
          type: string
        enabled:
          type: boolean
        daysOfWeek:
          type: array
          items:
            type: integer

    ReminderUpdate:
      type: object
      properties:
        title:
          type: string
        timeOfDay:
          type: string
        enabled:
          type: boolean
        daysOfWeek:
          type: array
          items:
            type: integer

    ChatMessage:
      type: object
      required: [id, role, content, createdAt]
      properties:
        id:
          type: integer
        role:
          type: string
          description: user or assistant
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    ChatMessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    ChatReply:
      type: object
      required: [userMessage, assistantMessage]
      properties:
        userMessage:
          $ref: "#/components/schemas/ChatMessage"
        assistantMessage:
          $ref: "#/components/schemas/ChatMessage"

    NpcChatTurn:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, npc]
        content:
          type: string

    NpcChatInput:
      type: object
      required: [npcId, message]
      properties:
        npcId:
          type: string
          minLength: 1
          maxLength: 64
        message:
          type: string
          minLength: 1
          maxLength: 1000
        history:
          type: array
          description: Recent conversation history. The server is stateless and does not persist it.
          items:
            $ref: "#/components/schemas/NpcChatTurn"

    NpcChatReply:
      type: object
      required: [reply]
      properties:
        reply:
          type: string

    WorldObject:
      type: object
      description: One placed object in the world. `kind` selects the client renderer; `data` carries kind-specific fields (bundled model id, position, rotation, scale, collision size, ...).
      required: [id, kind, data]
      properties:
        id:
          type: integer
        kind:
          type: string
          enum: [building, tree, lamp, prop, roofProp, car, fountain, stall, npc, house]
        data:
          type: object
          additionalProperties: true

    WorldMap:
      type: object
      required: [version, objects]
      properties:
        version:
          type: integer
          description: Monotonically increasing map version; also served as a weak ETag.
        objects:
          type: array
          items:
            $ref: "#/components/schemas/WorldObject"
