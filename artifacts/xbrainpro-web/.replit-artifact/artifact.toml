kind = "web"
previewPath = "/"
title = "XBrainPro"
version = "1.0.0"
id = "artifacts/xbrainpro-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20677

[services.development]
run = "pnpm --filter @workspace/xbrainpro-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/xbrainpro-web", "run", "build" ]
publicDir = "artifacts/xbrainpro-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20677"
BASE_PATH = "/"
